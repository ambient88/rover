name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Self-contained binaries ───────────────────────────────────────────────
  build-binaries:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: rover-linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
            artifact: rover-linux-arm64
          - os: windows-latest
            rid: win-x64
            artifact: rover-win-x64.exe
          - os: macos-latest
            rid: osx-x64
            artifact: rover-osx-x64
          - os: macos-latest
            rid: osx-arm64
            artifact: rover-osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/SubnetSearch.Cli/SubnetSearch.Cli.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -o ./publish

      - name: Rename output (Linux / macOS)
        if: runner.os != 'Windows'
        run: mv ./publish/rover ./${{ matrix.artifact }}

      - name: Rename output (Windows)
        if: runner.os == 'Windows'
        run: mv ./publish/rover.exe ./${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./${{ matrix.artifact }}

  # ── 2. Debian package ────────────────────────────────────────────────────────
  build-deb:
    name: Build .deb (amd64)
    runs-on: ubuntu-latest
    needs: build-binaries
    outputs:
      deb-name: ${{ steps.deb.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: rover-linux-x64

      - name: Build .deb
        id: deb
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          DEB_NAME="rover_${VERSION}_amd64.deb"
          echo "name=${DEB_NAME}" >> "$GITHUB_OUTPUT"

          mkdir -p deb-pkg/DEBIAN
          mkdir -p deb-pkg/usr/local/bin

          cp rover-linux-x64 deb-pkg/usr/local/bin/rover
          chmod +x deb-pkg/usr/local/bin/rover

          sed "s/VERSION/${VERSION}/" packaging/debian/control > deb-pkg/DEBIAN/control
          cp packaging/debian/postinst deb-pkg/DEBIAN/postinst
          chmod 755 deb-pkg/DEBIAN/postinst

          dpkg-deb --build deb-pkg "${DEB_NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: rover_*_amd64.deb

  # ── 3. Docker image ──────────────────────────────────────────────────────────
  build-docker:
    name: Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── 4. GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-deb]
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            rover-linux-x64/rover-linux-x64
            rover-linux-arm64/rover-linux-arm64
            rover-win-x64.exe/rover-win-x64.exe
            rover-osx-x64/rover-osx-x64
            rover-osx-arm64/rover-osx-arm64
            deb-package/rover_*_amd64.deb

  # ── 5. apt repository on GitHub Pages ────────────────────────────────────────
  check-gpg-secrets:
    name: Check GPG secrets
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        run: |
          if [ -n "$GPG_KEY" ] && [ -n "$GPG_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::GPG_PRIVATE_KEY or GPG_KEY_ID secret is not set — skipping apt repository deployment."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_ID: ${{ secrets.GPG_KEY_ID }}

  deploy-apt:
    name: Update apt repository
    runs-on: ubuntu-latest
    needs: [build-deb, check-gpg-secrets]
    if: needs.check-gpg-secrets.outputs.configured == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: incoming/

      - name: Install apt-utils
        run: sudo apt-get install -y apt-utils

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          # Ownertrust accepts only the full 40-char fingerprint, so derive it
          # from the imported key instead of relying on the GPG_KEY_ID format.
          FPR=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')
          echo "$FPR:6:" | gpg --import-ownertrust

      - name: Build apt repository content
        run: |
          mkdir -p apt-site/apt/pool/main
          mkdir -p apt-site/apt/dists/stable/main/binary-amd64

          cp incoming/*.deb apt-site/apt/pool/main/

          cd apt-site/apt
          apt-ftparchive packages pool/main > dists/stable/main/binary-amd64/Packages
          gzip -kf dists/stable/main/binary-amd64/Packages

          cat > /tmp/apt-ftparchive.conf <<EOF
          APT::FTPArchive::Release::Origin "rover";
          APT::FTPArchive::Release::Label "rover";
          APT::FTPArchive::Release::Suite "stable";
          APT::FTPArchive::Release::Codename "stable";
          APT::FTPArchive::Release::Architectures "amd64";
          APT::FTPArchive::Release::Components "main";
          EOF
          apt-ftparchive -c /tmp/apt-ftparchive.conf release dists/stable \
            > dists/stable/Release

          # CI has no TTY, so gpg must never try to open a pinentry prompt.
          gpg --batch --yes --pinentry-mode loopback \
            --default-key "${{ secrets.GPG_KEY_ID }}" \
            --armor --detach-sign \
            -o dists/stable/Release.gpg dists/stable/Release

          gpg --batch --yes --pinentry-mode loopback \
            --default-key "${{ secrets.GPG_KEY_ID }}" \
            --clearsign -o dists/stable/InRelease dists/stable/Release

      - name: Copy public GPG key for users
        run: cp packaging/gpg.key apt-site/gpg.key

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: apt-site
          # clean: false keeps old .deb files from previous releases
          clean: false
          commit-message: "apt: update for ${{ github.ref_name }}"
