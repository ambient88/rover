name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore SubnetSearch.sln

      - name: Build
        run: dotnet build SubnetSearch.sln -c Release --no-restore

      - name: Test
        run: >
          dotnet test SubnetSearch.sln
          -c Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --results-directory ./TestResults

      - name: Upload test results & coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults
          retention-days: 14

      # Coverage gating, Codecov upload and the dependency audit run once, on Linux only.
      - name: Enforce coverage threshold
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          file=$(find ./TestResults -name 'coverage.cobertura.xml' | head -n1)
          if [ -z "$file" ]; then echo "::error::coverage report not found"; exit 1; fi
          line=$(sed -n 's/.*<coverage[^>]*line-rate="\([0-9.]*\)".*/\1/p' "$file" | head -n1)
          branch=$(sed -n 's/.*<coverage[^>]*branch-rate="\([0-9.]*\)".*/\1/p' "$file" | head -n1)
          awk -v l="$line" -v b="$branch" 'BEGIN {
            lp = l * 100; bp = b * 100;
            printf "Line coverage:   %.1f%% (floor 90%%)\n", lp;
            printf "Branch coverage: %.1f%% (floor 75%%)\n", bp;
            fail = 0;
            if (l + 0 < 0.90) { print "::error::line coverage below 90%"; fail = 1 }
            if (b + 0 < 0.75) { print "::error::branch coverage below 75%"; fail = 1 }
            exit fail;
          }'

      - name: Dependency vulnerability audit
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          out=$(dotnet list SubnetSearch.sln package --vulnerable --include-transitive 2>&1)
          echo "$out"
          if echo "$out" | grep -q "has the following vulnerable"; then
            echo "::error::vulnerable NuGet packages detected"; exit 1
          fi

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docker-persistence:
    name: Docker data-dir smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t rover:ci .

      # Guards the F5 regression: the app reads SUBNETSEARCH_DATA_DIR, so the image must
      # expose exactly that (not the old typo'd SUBNETSSEARCH_DATA_DIR) for the /data volume
      # to be used and downloaded data to survive container recreation.
      - name: Verify data-dir env var
        run: |
          envs=$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' rover:ci)
          echo "$envs"
          if ! echo "$envs" | grep -qx 'SUBNETSEARCH_DATA_DIR=/data'; then
            echo "::error::image is missing SUBNETSEARCH_DATA_DIR=/data (F5)"; exit 1
          fi
          if echo "$envs" | grep -q 'SUBNETSSEARCH'; then
            echo "::error::typo'd env var SUBNETSSEARCH_DATA_DIR is present (F5)"; exit 1
          fi

      - name: Verify /data volume is declared
        run: |
          vols=$(docker inspect --format '{{range $v, $_ := .Config.Volumes}}{{println $v}}{{end}}' rover:ci)
          echo "$vols"
          echo "$vols" | grep -qx '/data' || { echo "::error::/data volume not declared"; exit 1; }
